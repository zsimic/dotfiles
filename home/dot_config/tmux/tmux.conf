unbind-key -a
set -g prefix  C-b

# Auto scroll with mouse wheel or page up/down, but only if no other process took the screen (such as vi or less)
set -g mouse on
set -s set-clipboard off
bind -n PageUp         if-shell -F "#{alternate_on}" "send-keys PageUp" "copy-mode -e; send-keys PageUp"
bind -n PageDown       if-shell "test #{pane_in_mode} -gt 0 -o #{alternate_on} -gt 0" "send-keys PageDown"
bind -n WheelUpPane    if-shell -F "#{alternate_on}" "send-keys -M" "select-pane -t= \; copy-mode -e \; send-keys -M"
bind -n WheelDownPane  if-shell -F "#{alternate_on}" "send-keys -M" "select-pane -t= \;                 send-keys -M"

# Most commonly used combinations
bind c              new-window -c "#{pane_current_path}"
bind d              detach-client
bind -n M-`         last-window
bind -n M-Left      previous-window
bind -n M-Right     next-window
bind PageUp         copy-mode -u

# Misc, useful mostly when changing tmux conf
bind ,              command-prompt -I "#W" "rename-window '%%'"
bind ':'            command-prompt
bind ?              list-keys
bind q              display-panes
bind r              source-file ~/.config/tmux/tmux.conf \; display-message "Reloaded tmux.conf"
bind '~'            show-messages
bind -n C-S-Insert  kill-session -C                 # Clear alerts
bind t              clock-mode

# Pane splitting (I use this very rarely)
bind |              split-window -h -c "#{pane_current_path}"
bind -              split-window -v -c "#{pane_current_path}"
bind !              break-pane

bind -n M-Up        select-pane -U
bind -n M-Down      select-pane -D
bind -n M-S-Up      select-pane -U
bind -n M-S-Down    select-pane -D
bind -n M-S-Left    select-pane -L
bind -n M-S-Right   select-pane -R

bind -n C-S-Up     resize-pane -U 2
bind -n C-S-Down   resize-pane -D 2
bind -n C-S-Left   resize-pane -L 2
bind -n C-S-Right  resize-pane -R 2

# Activity shown with tmux window title colors (current window highlighted, inactive are dim):
# no unseen activity: white dim
# unseen recent activity: amber (#ffc84a) bold
# unseen activity after 10s of silence: coral red (#f73b3b) bold
setw -g monitor-activity on
setw -g monitor-silence 10
set -g visual-silence off
set -g silence-action none
set -g activity-action none
setw -g window-status-activity-style default
setw -g window-status-format '#{?window_activity_flag,#{?window_silence_flag,#[fg=#f73b3b bold bg=#140000],#[fg=#ffc84a bold bg=#0f0000]},#[fg=white dim]}  #W  #[default]'
setw -g window-status-current-format '⊣ #W ⊢'
setw -g window-status-style fg=white,dim
setw -g window-status-current-style fg=green,bright

# Settings
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB:hyperlinks:sync:extkeys"
# set -as terminal-features ",xterm-ghostty:RGB:hyperlinks:sync:extkeys"
set -g history-limit 100000
set -sg escape-time 1  # Do away with esc/alt disambiguation
set -g visual-activity off
set -g status-keys vi
set -g base-index 1
set -g pane-base-index 1
set -g status-interval 60
setw -g alternate-screen on
setw -g xterm-keys on
set -gw xterm-keys on
setw -g mode-keys vi
set -s extended-keys on
set -s extended-keys-format csi-u

# Minimalist status bar, git branch and uptime on bottom right
set -g allow-rename on
setw -g automatic-rename off
set -g set-titles off
setw -g aggressive-resize on
set -g status-justify left
set -g status-style none
set -g status-left ""
set -g status-right '#(/usr/bin/python3 ~/bin/gremlins/shrinky tmux_status -p"#{pane_current_path}")'
set -g status-right-length 30

set-option -ag update-environment "__CFBundleIdentifier COLORFGBG LC_TERMINAL LC_TERMINAL_VERSION MANPATH XDG_DATA_DIRS"
set-option -ag update-environment "TERM TERM_PROGRAM TERM_PROGRAM_VERSION TERMINFO TERMINFO_DIRS TERM_FEATURES TERM_SESSION_ID"
set-option -ag update-environment "GHOSTTY_BIN_DIR GHOSTTY_RESOURCES_DIR GHOSTTY_SHELL_FEATURES"
set-option -ag update-environment "ITERM_PROFILE ITERM_SESSION_ID"

# set -g allow-passthrough on
