enter_accept = false  # execute command on enter

search_mode_shell_up_key_binding = "fuzzy"  # default searchmode from shell up-key
filter_mode_shell_up_key_binding = "host"
inline_height_shell_up_key_binding = 3

auto_sync = false
update_check = false

filter_mode = "host"
inline_height = 6
invert = false
style = "compact"
show_preview = true
show_help = false
show_tabs = false

[keys]
scroll_exits = false  # exit when scrolled past the last or first entry
exit_past_line_start = false  # exit TUI when scrolling left while the cursor is at the start of the line
accept_past_line_end = true  # right arrow key performs the same functionality as Tab

[search]
authors = ["$all-user", "$all-agent"]
filters = ["session-preload", "directory", "workspace", "host", "session"]
recency_score_multiplier = 2.0
frequency_score_multiplier = 1.0
frecency_score_multiplier = 2.0

search_mode = "daemon-fuzzy"

#[daemon]
#enabled = true
#autostart = true

[logs]
enabled = true
dir = "~/.local/share/atuin/logs"
level = "info"
retention = 4

[ui]
columns = ["duration", { type = "user", width = 5 }, "time", "command"]
